# 行銷方法論知識庫（中性化蒸餾）
#
# 本檔蒸餾自業界公開、廣泛認可的通用行銷/電商方法論，轉成不具名、可執行的
# 檢核原則。刻意不使用任何真實人名、課程名或商標，也不宣稱與任何特定專家
# 有關聯——與 docs/content_writer_guide.md 的合規精神一致（蒸餾成通用原則、
# 避免侵權、不綁單一權威來源）。目的是讓任何人免費就能用這些方法論做檢核，
# 不需購買課程或代操服務。
#
# 資料結構：每個領域一組 principles，每條含 check（檢核點）與 why（為什麼/怎麼做）；
# 另有 last_reviewed 標記最後審查/確認日期。
# ecommerce/Content Writer/Meta Ads/growth/matrix 等模組可載入引用。
#
# 免責聲明：以下原則為通用行銷/電商實務的蒸餾整理，效果因產業、市場、時機、
# 執行細節而異，不構成投資、行銷成效或業績的保證；平台演算法與政策
# （例如 Amazon、Meta 廣告政策）會隨時間變動，請以官方最新規範為準，
# last_reviewed 僅代表本檔內容最後一次被人工檢視確認的日期，不代表持續
# 監控更新。

domains:
  ecommerce:
    label: Amazon / 電商平台 Listing 優化
    last_reviewed: "2026-07-08"
    principles:
      - check: 標題前 80 字放入核心品類、主要關鍵字、關鍵差異點
        why: 平台搜尋與手機版首屏都依賴前段資訊，避免把品牌口號放在最前面。
      - check: 標題不要堆疊重複關鍵字
        why: 保留可讀性，使用「品類 + 使用情境 + 核心規格 + 差異化」結構即可。
      - check: 五點賣點每點只講一個購買理由
        why: 用「痛點 → 功能 → 好處 → 證據」寫法，讓使用者快速掃讀。
      - check: 主圖必須清楚呈現商品本體與主要配件
        why: 主圖影響點擊率，避免過度裝飾、資訊擁擠或看不出實際商品。
      - check: 副圖要覆蓋尺寸、材質、使用情境、比較、安裝/使用步驟
        why: 副圖負責降低疑慮，應回答買家下單前最常問的問題。
      - check: A+ 內容要補足 listing 上方沒講完的信任與品牌故事
        why: 不要重複 bullet points，應加入情境、比較表、保固、品牌可信度。
      - check: 後端關鍵字只放未出現在前台但相關的搜尋詞
        why: 避免浪費欄位，不放競品商標、無關詞或重複詞。
      - check: 評論與 QA 要整理成內容改版依據
        why: 把常見負評、疑問、使用誤解轉成 bullet、副圖、A+、FAQ 的優化點。
      - check: PPC 要分開看曝光、點擊、轉換與 ACOS
        why: 高曝光低點擊看主圖/標題，高點擊低轉換看 listing，ACOS 高看出價與關鍵字意圖。
      - check: 庫存、價格、配送與 Buy Box 風險要納入 SEO/廣告判斷
        why: 流量再好，缺貨、價格異常或失去購買入口都會拖垮轉換。
      - check: 變體 listing 必須符合真實規格差異
        why: 錯誤合併變體會造成體驗與合規風險，應只合併顏色、尺寸、容量等合理變體。
      - check: 季節性商品要提前規劃搜尋詞、素材與庫存
        why: 旺季前就要完成 listing、PPC、促銷與庫存安排，避免高需求期才開始測試。

  paid_ads_funnel:
    label: 付費廣告 / 漏斗
    last_reviewed: "2026-07-08"
    principles:
      - check: 每個廣告素材前 3 秒必須有明確 hook
        why: 先講痛點、結果、反差或強情境，避免用品牌介紹當開場。
      - check: 受眾要分 cold、warm、hot，不要混在同一組訊息裡
        why: 陌生受眾需要理解問題，暖受眾需要比較理由，熱受眾需要行動誘因。
      - check: 漏斗階段要對應正確 campaign 目標
        why: 曝光、流量、名單、購買各自優化方向不同，不應用錯目標判讀成效。
      - check: 每次測試只改一個主要變因
        why: 素材、受眾、版位、出價同時改會無法判斷是哪個因素造成結果。
      - check: 創意變體至少覆蓋不同角度，而不只是換顏色
        why: 測試痛點型、利益型、證據型、比較型、情境型，比單純視覺微調更有判讀價值。
      - check: 素材疲勞要看 frequency、CTR 下降與 CPA 上升
        why: 若同一受眾反覆看到相同素材，應輪替 hook、視覺、offer 或擴大受眾。
      - check: 高 CTR 低轉換要檢查著陸頁一致性
        why: 廣告承諾、頁面標題、CTA、價格與表單必須接得上，否則流量會流失。
      - check: 再行銷訊息要根據行為分層
        why: 看過內容、加入購物車、看價格頁、填表未完成的人，需要不同阻力解除訊息。
      - check: 出價策略要配合資料量與目標
        why: 資料不足時先累積事件，資料穩定後再考慮成本控制或價值型優化。
      - check: 成效判讀不能只看平台內 ROAS
        why: 要交叉檢查 GA4、CRM、UTM、訂單與退款，避免被平台歸因高估或低估。
      - check: 預算調整應小幅、分批、可回滾
        why: 大幅調整可能干擾學習期，應先產 dry-run 計畫並標記人工確認。
      - check: 停用低效素材前要確認樣本量足夠
        why: 曝光、點擊或轉換太少時不宜過早判死，需先設定最低觀察門檻。

  content_brand:
    label: 內容 / 品牌成長
    last_reviewed: "2026-07-08"
    principles:
      - check: 內容要先對齊搜尋意圖或平台情境
        why: 資訊型、比較型、購買型、在地型內容需要不同標題、結構與 CTA。
      - check: 用主題群集規劃內容，而不是單篇零散發文
        why: 以核心頁串接子題文章，建立權威感與內部連結結構。
      - check: 每篇內容要有明確讀者任務
        why: 先定義讀者看完要理解、比較、決策或行動什麼，再安排段落。
      - check: 內容要展示經驗、專業、可信來源與可驗證資訊
        why: 加入實例、流程、限制條件、資料來源與人工審核提示，避免空泛 AI 文。
      - check: 品牌故事要連到使用者問題，不是只講自己
        why: 用「使用者困境 → 品牌如何解決 → 證據」取代自我介紹式文案。
      - check: 同一主題要規劃跨平台再利用
        why: 長文可拆成短影音腳本、社群貼文、電子報、FAQ、圖卡，提高內容投資回收。
      - check: 每個內容都要有下一步 CTA
        why: CTA 不一定是購買，也可以是下載、訂閱、看案例、預約、加入名單。
      - check: 內部連結要有語境與目的
        why: 不要硬塞連結，應把使用者導向更深入、可轉換或相關的下一頁。
      - check: 內容行事曆要平衡教育、信任、轉換與互動
        why: 只發銷售文會疲乏，只發知識文會缺轉換，需設計內容組合。
      - check: 病毒傳播元素要設計分享理由
        why: 可用清單、模板、反差觀點、身份認同、實用工具或可轉貼圖表提高分享率。
      - check: 社群經營要有固定節奏與回應機制
        why: 發文只是起點，留言、私訊、投票、問答與回訪才會累積受眾關係。
      - check: 內容成效要分開看曝光、互動、點擊、轉換
        why: 不同內容任務不應用同一 KPI 評分，品牌內容與銷售內容要分開判讀。

  growth_hacking:
    label: 轉換 / 成長駭客
    last_reviewed: "2026-07-08"
    principles:
      - check: 先定義北極星指標
        why: 選一個能代表使用者價值與業務成長的核心指標，避免團隊各追各的數字。
      - check: 用 AARRR 拆解漏斗
        why: 分別檢查獲取、啟動、留存、收入、推薦，找出最大瓶頸再做實驗。
      - check: 每個實驗都要有明確假設
        why: 格式可用「如果改變 X，因為 Y，指標 Z 會提升」，避免盲目亂試。
      - check: 實驗前先定義成功門檻與停止條件
        why: 避免看到短期波動就提早宣布勝利或失敗。
      - check: 啟動流程要讓使用者快速到達 aha moment
        why: 找出使用者第一次感受到價值的行為，縮短前置步驟並引導完成。
      - check: onboarding 不要一次要求太多資料
        why: 先收能完成第一個價值體驗的必要資訊，其餘延後漸進補齊。
      - check: 留存曲線要分 cohort 觀察
        why: 不同來源、版本、方案、時間進來的使用者應分開看，才找得到真正改善點。
      - check: 流失用戶要設計召回理由
        why: 召回訊息應對應流失原因，例如未啟動、價格疑慮、功能不懂、替代品比較。
      - check: 病毒係數 K 要拆成邀請率與接受率
        why: 若邀請少，要改善推薦入口；若接受少，要改善邀請訊息與誘因。
      - check: 推薦機制要讓推薦者與被推薦者都有理由行動
        why: 雙邊誘因、清楚規則、低摩擦分享，比單純放一個推薦連結有效。
      - check: 定價與方案要對應使用者分層
        why: 用入門、成長、進階或客製方案承接不同需求，避免所有人只看到同一價格。
      - check: 升級提示要出現在價值被感受到之後
        why: 在使用者完成關鍵行為、遇到限制或看到成果時提示，比一進站就推銷更自然。
      - check: 成長實驗要記錄決策，而不只記錄結果
        why: 保留假設、版本、樣本、結果、結論與下一步，避免團隊重複踩坑。
      - check: 高風險成長手段要先做合規與品牌風險檢查
        why: 涉及個資、推薦誘因、價格、限時宣稱或自動化觸達時，必須人工審核。
