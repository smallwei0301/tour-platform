name: refund-reconcile

on:
  schedule:
    # 每小時一次（省 GitHub 分鐘）。主路徑是 ECPay 即時 callback，本對帳只是補漏，
    # 延遲 1 小時影響很小；逐筆冪等故重跑安全。
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      # Set REFUND_RECONCILE_ENABLED=true in repo secrets to activate live ECPay reconciliation.
      # When not set, the script exits 0 with HOLD status (no red CI noise during soft-launch).
      REFUND_RECONCILE_ENABLED: ${{ secrets.REFUND_RECONCILE_ENABLED }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ECPAY_MERCHANT_ID: ${{ secrets.ECPAY_MERCHANT_ID }}
      ECPAY_HASH_KEY: ${{ secrets.ECPAY_HASH_KEY }}
      ECPAY_HASH_IV: ${{ secrets.ECPAY_HASH_IV }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Run refund reconciliation
        run: node scripts/cron/refund-reconcile.mjs

      - name: Notify on failure (Telegram + Email)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: failure
        run: node scripts/cron/notify-failure.mjs
