name: refund-reconcile

on:
  schedule:
    # every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ECPAY_MERCHANT_ID: ${{ secrets.ECPAY_MERCHANT_ID }}
      ECPAY_HASH_KEY: ${{ secrets.ECPAY_HASH_KEY }}
      ECPAY_HASH_IV: ${{ secrets.ECPAY_HASH_IV }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Run refund reconciliation
        run: node scripts/cron/refund-reconcile.mjs
