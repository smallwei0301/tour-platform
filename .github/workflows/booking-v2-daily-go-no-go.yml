name: booking-v2-daily-go-no-go

on:
  schedule:
    # 01:30 UTC = 09:30 Asia/Taipei
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Optional report date (YYYY-MM-DD). Defaults to current UTC date.'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GO_NOGO_DATE: ${{ github.event.inputs.date }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Run daily dashboard + go/no-go
        run: |
          if [ -n "${GO_NOGO_DATE}" ]; then
            npm run rollout:booking-v2-daily -- --date=${GO_NOGO_DATE}
          else
            npm run rollout:booking-v2-daily
          fi

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-v2-go-no-go-reports-${{ github.run_id }}
          path: docs/operations/reports/booking-v2-*.md
          if-no-files-found: warn
