name: synthetic-health-probe

on:
  # 排程已退役：改用外部免費監控 UptimeRobot（每 5 分鐘打 /，Email 告警），不再燒
  # GitHub 分鐘（原本每 15 分鐘 ≈ 2,918 分鐘/月）。保留 workflow_dispatch，需要更深的
  # /api/health（{ok:true}）檢查時仍可手動觸發。建議在 UptimeRobot 另加一個 monitor
  # 指向 /api/health 以涵蓋深度檢查。
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        id: check-secrets
        env:
          HAS_URL: ${{ secrets.NEXT_PUBLIC_VERCEL_URL != '' }}
        run: |
          if [ "$HAS_URL" != "true" ]; then
            echo "WARNING: NEXT_PUBLIC_VERCEL_URL secret not configured."
            echo "   Set it in GitHub repo Settings → Secrets → Actions to enable synthetic monitoring."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run synthetic health probe
        if: steps.check-secrets.outputs.skip != 'true'
        env:
          NEXT_PUBLIC_VERCEL_URL: ${{ secrets.NEXT_PUBLIC_VERCEL_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # #1472：cold start 防誤報 — timeout 放寬 + 失敗重試（腳本內建遞增 backoff）
          PROBE_TIMEOUT_MS: '10000'
          PROBE_MAX_ATTEMPTS: '2'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          DRY_RUN: ${{ vars.SYNTHETIC_PROBE_DRY_RUN || '' }}
        run: node scripts/cron/synthetic-health-probe.mjs | tee /tmp/probe-results.json

      - name: Upload probe results as artifact
        if: steps.check-secrets.outputs.skip != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-health-probe-${{ github.run_id }}
          path: /tmp/probe-results.json
          retention-days: 7
