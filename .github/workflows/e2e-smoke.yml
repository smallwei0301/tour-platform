name: e2e-smoke

# Issue #1275 — focused Playwright smoke lane for launch-critical browser flows.
#
# This is a SEPARATE workflow from ci.yml (which stays lint → typecheck → node
# test → build → preflight, unchanged). It runs a small, bounded allowlist of
# durable, backend-mocked Playwright specs (no real Supabase / payment mutation)
# so browser-only regressions are caught without opening a one-off QA issue.
#
# Triggers:
#   - workflow_dispatch — manual run / post-merge evidence.
#   - schedule          — daily safety net.
#   - pull_request (path-filtered) — only PRs touching the booking/guide browser
#     surfaces or the e2e specs/workflow, to keep the lane focused and cheap.
#
# Adding a spec to the smoke lane: append it to the `test:e2e:smoke` script in
# apps/web/package.json. Only add specs that (a) mock the backend via
# page.route(), (b) need no real Supabase/payment/PII data, and (c) are stable
# under `--workers=1`. Keep total runtime within the timeout budget below.

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *' # daily 02:00 UTC
  pull_request:
    paths:
      - 'apps/web/app/booking/**'
      - 'apps/web/app/guide/**'
      - 'apps/web/e2e/**'
      - 'apps/web/playwright.config.ts'
      - 'apps/web/package.json'
      - '.github/workflows/e2e-smoke.yml'

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DISABLE_SENTRY_BUILD: '1'
      # Non-production dummy values only (mirrors ci.yml). The Playwright config's
      # managed webServer (`npm run dev`) inherits these so admin/guide session
      # minting works; specs mock all data APIs via page.route().
      GUIDE_SESSION_SECRET: ci-guide-session-secret-0123456789abcdef
      ADMIN_ACCESS_TOKEN: ci-admin-token-0123456789abcdef
      ADMIN_EMAIL_ALLOWLIST: admin@tour-platform.com
      ADMIN_EMAIL: admin@tour-platform.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run focused E2E smoke (bounded allowlist)
        run: npm run test:e2e:smoke -w @tour/web

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
