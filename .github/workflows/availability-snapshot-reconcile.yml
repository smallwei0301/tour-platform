name: availability-snapshot-reconcile

on:
  schedule:
    # daily 02:20 UTC (10:20 Asia/Taipei)
    - cron: '20 2 * * *'
  workflow_dispatch:
    inputs:
      from:
        description: 'from date (YYYY-MM-DD)'
        required: false
        type: string
      to:
        description: 'to date (YYYY-MM-DD)'
        required: false
        type: string

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Reconcile availability snapshot
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.from }}" ]; then
            ARGS="$ARGS --from=${{ github.event.inputs.from }}"
          fi
          if [ -n "${{ github.event.inputs.to }}" ]; then
            ARGS="$ARGS --to=${{ github.event.inputs.to }}"
          fi
          npm run snapshot:availability:backfill -- $ARGS
