name: Readiness Snapshot Refresh

on:
  schedule:
    - cron: '0 5 * * *'  # 每日一次（05:00 UTC／台北 13:00）；由每 6 小時降頻至每日
  workflow_dispatch:        # Allow manual trigger

jobs:
  refresh-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read   # readiness:snapshot 用 gh issue list 抓 open issues，缺此權限會 403

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Refresh readiness snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run readiness:snapshot

      - name: Check if snapshot changed
        id: diff
        run: |
          if git diff --quiet docs/operations/reports/readiness-live-state-latest.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated snapshot
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/operations/reports/readiness-live-state-latest.md
          git commit -m "chore(docs): auto-refresh readiness live-state snapshot [skip ci]"
          git push

      - name: Verify freshness & drift
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # #1298: do NOT swallow the result with `|| true`. If the snapshot is
        # stale (the refresh step produced no fresh file → no commit) the check
        # exits non-zero and this job fails VISIBLY, surfacing silent staleness
        # instead of reporting green while the committed file drifts.
        run: npm run readiness:check
