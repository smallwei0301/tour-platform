name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DISABLE_SENTRY_BUILD: '1'
      # CI build runs with NODE_ENV=production; provide strong non-default test secrets
      GUIDE_SESSION_SECRET: ci-guide-session-secret-0123456789abcdef
      ADMIN_ACCESS_TOKEN: ci-admin-token-0123456789abcdef
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Web lint
        run: npm run lint -w @tour/web

      - name: Web typecheck
        run: npm run typecheck -w @tour/web

      - name: Web tests
        run: npm run test -w @tour/web

      - name: Web build
        run: npm run build -w @tour/web

      - name: Preflight
        run: bash scripts/preflight-check.sh
