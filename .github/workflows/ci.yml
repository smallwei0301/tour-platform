name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DISABLE_SENTRY_BUILD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Web tests
        run: npm run test -w @tour/web

      - name: Web build
        run: npm run build -w @tour/web

      - name: Preflight
        run: bash scripts/preflight-check.sh
