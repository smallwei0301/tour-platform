name: rls-grants-preflight

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 03:00 UTC
  workflow_dispatch: {}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check required secrets
        id: check-secrets
        env:
          HAS_URL: ${{ secrets.SUPABASE_URL != '' }}
          HAS_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: |
          if [ "$HAS_URL" != "true" ] || [ "$HAS_KEY" != "true" ]; then
            echo "HOLD: SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY not configured."
            echo "   Set them in GitHub repo Settings → Secrets → Actions."
            # Write explicit HOLD artifact
            mkdir -p /tmp/rls-preflight
            echo '{"overall_status":"hold","reason":"missing_secrets","missing":["SUPABASE_URL and/or SUPABASE_SERVICE_ROLE_KEY"],"timestamp":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' > /tmp/rls-preflight/rls-preflight.json
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload HOLD artifact (missing secrets)
        if: steps.check-secrets.outputs.skip == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rls-preflight-${{ github.run_id }}
          path: /tmp/rls-preflight/rls-preflight.json
          retention-days: 30

      - name: Write HOLD summary
        if: steps.check-secrets.outputs.skip == 'true'
        run: |
          echo "## RLS/Grants Preflight — HOLD" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** HOLD — secrets not configured" >> $GITHUB_STEP_SUMMARY
          echo "Set \`SUPABASE_URL\` and \`SUPABASE_SERVICE_ROLE_KEY\` in repo Settings → Secrets → Actions." >> $GITHUB_STEP_SUMMARY

      - name: Checkout
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.check-secrets.outputs.skip != 'true'
        run: npm ci

      - name: Run RLS/grants preflight
        if: steps.check-secrets.outputs.skip != 'true'
        id: preflight
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p /tmp/rls-preflight
          node scripts/security/rls-grants-preflight.mjs --json --output /tmp/rls-preflight/rls-preflight.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Write step summary
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          echo "## RLS/Grants Preflight Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/rls-preflight/rls-preflight.json ]; then
            STATUS=$(node -e "const d=require('/tmp/rls-preflight/rls-preflight.json'); console.log(d.overall_status || d.status || 'unknown')" 2>/dev/null || echo "unknown")
            TABLE_COUNT=$(node -e "const d=require('/tmp/rls-preflight/rls-preflight.json'); console.log((d.tables||d.results||[]).length)" 2>/dev/null || echo "?")
            echo "**Status:** $STATUS" >> $GITHUB_STEP_SUMMARY
            echo "**Tables checked:** $TABLE_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Full JSON artifact uploaded. Review for violations before signing off._" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** UNKNOWN — output file not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload preflight artifact
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rls-preflight-${{ github.run_id }}
          path: /tmp/rls-preflight/rls-preflight.json
          retention-days: 30

      - name: Fail if preflight failed
        if: steps.check-secrets.outputs.skip != 'true' && steps.preflight.outcome == 'failure'
        run: |
          echo "RLS/grants preflight FAILED — review artifact for violations"
          exit 1

      # 失敗即主動推播（對齊 anon-rls-probe / settlement / ecpay-*-sweep）。
      # 補上這步前，本每週掃描抓到 RLS-off／anon 寫入權等問題時只會在 Actions 頁變紅、
      # 不會通知——owner 靠排程偵測就收不到。notify-failure.mjs 缺通道 secret 自動略過、
      # 退出碼恆 0，不會讓已失敗的 job 更糟。
      - name: Notify on failure (Telegram + Email)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: failure
        run: node scripts/cron/notify-failure.mjs
