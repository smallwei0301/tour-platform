name: unpaid-expiry-sweep

on:
  schedule:
    # #1493：名額釋放已改由「讀取時過濾」即時處理（available-slots / draft 會把逾時
    # 未付款的 draft 佔位濾掉），不再依賴此排程。此處保留為**每日一次**的低頻兜底，
    # 只負責補做「實體取消 + 寄逾時取消信 + 標記 cancelled_unpaid」。
    # 每日一次 ≈ 30 分鐘/月（GitHub Actions 計費以分鐘進位），免費額度內可忽略。
    - cron: '0 18 * * *' # 02:00 Asia/Taipei daily
  workflow_dispatch: {}

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        id: check-secrets
        env:
          HAS_URL: ${{ secrets.NEXT_PUBLIC_VERCEL_URL != '' }}
          HAS_TOKEN: ${{ secrets.INTERNAL_ALERT_TOKEN != '' }}
        run: |
          if [ "$HAS_URL" != "true" ] || [ "$HAS_TOKEN" != "true" ]; then
            echo "⚠️ NEXT_PUBLIC_VERCEL_URL or INTERNAL_ALERT_TOKEN secrets not configured."
            echo "   Set them in GitHub repo Settings → Secrets → Actions to enable the unpaid-expiry sweep."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: POST to unpaid-expiry-sweep endpoint
        if: steps.check-secrets.outputs.skip != 'true'
        env:
          NEXT_PUBLIC_VERCEL_URL: ${{ secrets.NEXT_PUBLIC_VERCEL_URL }}
          INTERNAL_ALERT_TOKEN: ${{ secrets.INTERNAL_ALERT_TOKEN }}
        run: |
          RESPONSE=$(curl -s -o /tmp/sweep-response.json -w "%{http_code}" \
            -X POST \
            "https://${NEXT_PUBLIC_VERCEL_URL}/api/internal/bookings/unpaid-expiry-sweep" \
            -H "Content-Type: application/json" \
            -H "x-internal-token: ${INTERNAL_ALERT_TOKEN}" \
            -d '{}')
          echo "HTTP status: $RESPONSE"
          cat /tmp/sweep-response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "Sweep returned non-200 status: $RESPONSE"
            exit 1
          fi
          echo "✅ Unpaid-expiry sweep completed successfully."
